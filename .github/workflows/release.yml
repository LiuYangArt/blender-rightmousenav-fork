name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            version=$(python scripts/versioning.py check --release-tag "$REF_NAME")
            tag="$REF_NAME"
            target="$GITHUB_SHA"
            is_tag_push="true"
          else
            version=$(python scripts/versioning.py bump-patch)
            tag="v$version"
            target=""
            is_tag_push="false"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_TARGET=$target" >> "$GITHUB_ENV"
          echo "RELEASE_IS_TAG_PUSH=$is_tag_push" >> "$GITHUB_ENV"

      - name: Validate add-on
        run: python scripts/validate_addon.py

      - name: Build release package
        run: python scripts/build_release_package.py --output dist --release-tag "$RELEASE_TAG"

      - name: Publish auto version tag
        if: env.RELEASE_IS_TAG_PUSH == 'false'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blender_manifest.toml
          git commit -m "chore(release): 发布 $RELEASE_TAG"
          git tag "$RELEASE_TAG"
          git push origin "HEAD:$REF_NAME" "$RELEASE_TAG"
          echo "RELEASE_TARGET=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ue_navigation-release-package
          path: dist/*.zip
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.zip --target "$RELEASE_TARGET" --title "UE Navigation $RELEASE_TAG" --notes "Automated UE Navigation release package."
          fi